name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # बिना ग्रेड फाइल के बिल्ड करने के लिए ये सबसे सुरक्षित तरीका है
      - name: Install Gradle
        run: sudo apt-get update && sudo apt-get install -y gradle
        
      - name: Create .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
      
      - name: Update App Name
        run: |
          sed -i 's/>LiveStream-TV-Player</>Takano Live</g' app/src/main/res/values/strings.xml
        
      # अब ./gradlew की जगह सीधे gradle कमांड का इस्तेमाल होगा
      - name: Build with Gradle
        run: gradle assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
