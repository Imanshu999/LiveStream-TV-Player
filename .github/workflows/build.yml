name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Create Build Environment
        run: |
          # 1. प्रोजेक्ट ढांचा तैयार करना
          mkdir -p gradle/wrapper
          
          # 2. अगर build.gradle नहीं है, तो एक बेसिक फाइल बनाना
          if [ ! -f "build.gradle" ]; then
            echo 'plugins { id("com.android.application") version "8.0.0" apply false }' > build.gradle
          fi
          
          # 3. ऐप मॉड्यूल के लिए ढांचा और फाइल बनाना
          mkdir -p app
          if [ ! -f "app/build.gradle" ]; then
            echo 'plugins { id("com.android.application") } android { compileSdk 34 }' > app/build.gradle
          fi
          
          # 4. ग्रैडल रैपर जनरेट करना
          gradle wrapper
          chmod +x gradlew
        
      - name: Build with Gradle
        run: ./gradlew :app:assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
