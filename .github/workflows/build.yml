name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # यह स्टेप कीस्टोर की एरर को बायपास करने के लिए सबसे महत्वपूर्ण है
      - name: Build APK
        run: |
          # 1. ग्रेड रैपर बनाना (अगर नहीं है)
          gradle wrapper
          chmod +x gradlew
          
          # 2. बिल्ड कमांड: -x validateSigning कीस्टोर चेकिंग को बंद कर देगा
          ./gradlew assembleDebug -x validateSigning
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
