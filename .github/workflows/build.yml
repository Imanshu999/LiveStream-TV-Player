name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: sudo apt-get update && sudo apt-get install -y gradle
        
      # यह स्टेप 'settings.gradle.kts' खुद बना देगा ताकि Gradle 'app' फोल्डर को ढूंढ सके
      - name: Prepare Gradle Environment
        run: |
          echo 'include(":app")' > settings.gradle.kts
        
      - name: Create .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
      
      - name: Update App Name
        run: |
          sed -i 's/>LiveStream-TV-Player</>Takano Live</g' app/src/main/res/values/strings.xml
        
      # अब सीधे बिल्ड कमांड
      - name: Build with Gradle
        run: gradle :app:assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
