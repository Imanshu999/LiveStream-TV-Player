name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # Permission फिक्स ताकि gradlew एरर न आए
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Create .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
      
      # यहाँ ऐप का नाम बदलने की कमांड (Replace "Your App Name" with your desired name)
      - name: Update App Name
        run: |
          sed -i 's/>LiveStream-TV-Player</>Takano Live</g' app/src/main/res/values/strings.xml
        
      - name: Build with Gradle
        run: ./gradlew assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
