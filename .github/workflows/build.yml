name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # सबसे ज़रूरी स्टेप: कीस्टोर चेकिंग को बंद करना और बिल्ड करना
      - name: Build APK
        run: |
          # 1. ग्रैडल रैपर की अनुमतियाँ सेट करें
          chmod +x gradlew || true
          
          # 2. कीस्टोर फाइल के बिना बिल्ड करने के लिए 'validateSigning' को डिसेबल करें
          ./gradlew assembleDebug -x validateSigning --stacktrace
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
